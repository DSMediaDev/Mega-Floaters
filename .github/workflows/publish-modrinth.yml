name: Publish to Modrinth

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Gradle build
        run: ./gradlew --no-daemon build

      - name: Extract version from tag
        id: tag
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog section for this version
        id: changelog
        run: |
          awk -v ver="${{ steps.tag.outputs.version }}" '
            BEGIN { capture = 0 }
            /^## \[/ {
              if (capture) exit
              if (index($0, "[" ver "]")) { capture = 1; next }
            }
            capture { print }
          ' CHANGELOG.md > release_notes.md
          echo "path=release_notes.md" >> "$GITHUB_OUTPUT"

      - name: Publish to Modrinth + GitHub Release
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ secrets.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

          files: build/libs/megafloaters-*.jar
          name: Mega Floaters v${{ steps.tag.outputs.version }}
          version: ${{ steps.tag.outputs.version }}
          version-type: release
          changelog-file: release_notes.md

          loaders: neoforge
          game-versions: 1.21.1
          java: 21
